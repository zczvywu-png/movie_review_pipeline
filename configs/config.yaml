# ---- 向量化 ----
vectorize:
  text:
    tfidf_max_features: 3000
    tfidf_min_df: 2
    doc2vec_vector_size: 100
    doc2vec_epochs: 30
    word2vec_vector_size: 100
  image:
    clip_model: "openai/clip-vit-base-patch32"
    resnet_model: "resnet50"
    image_size: 224

# ---- OpenAI ----
openai:
  model: "gpt-4o-mini"               # 便宜版本
  max_tokens: 200
  temperature: 0.3
  batch_size: 10
  sentiment_sample_size: 300         # 给 GPT 打标的评论数（控制成本）
  synthetic_per_genre: 20            # 每类型生成多少条合成评论

# ---- 机器学习 ----
ml:
  kmeans_n_clusters: 6
  classifier_test_size: 0.2
  random_state: 42
  poster_train_epochs: 5
  poster_batch_size: 16

# ---- 输出 ----
output:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  posters_dir: "data/posters"
  figures_dir: "outputs/figures"
  models_dir: "outputs/models"
