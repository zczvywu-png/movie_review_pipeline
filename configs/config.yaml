# ============================================================
# 电影评论分析工作流 - 主配置
# ============================================================

# ---- 抓取规模控制 ----
scrape:
  comments_per_video: 150          # 每个 YouTube 视频抓多少条评论（150 已远超作业 200-300/数据集 的硬指标，省 30% 时间）
  max_videos_per_genre: 4          # 每个电影类型抓几部
  imdb_reviews_per_movie: 60       # 每部电影 IMDb 评论数
  posters_per_movie: 1             # 每部电影海报数
  request_delay_sec: 1.0           # 请求间隔（防反爬）

# ---- 电影选择（按类型分组） ----
# 选用近年高热度、预告片评论丰富的电影
# YouTube 视频 ID 来自官方电影频道发布的预告片
movies:
  action:
    - title: "Mission: Impossible - Dead Reckoning"
      year: 2023
      tmdb_id: 575264
      imdb_id: "tt9603212"
      youtube_trailer_id: "avz06PDqDbM"     # Official Trailer
